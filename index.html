<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#070b14">
    <title>PRO PREDICT ⚽</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
        :root{--g:#00e5b0;--g2:rgba(0,229,176,.12);--r:#ff4d6a;--y:#ffb830;--b:#5b8dee;--ok:#2ecc71;--bg:#070b14;--bg2:#0d1220;--card:#111827;--card2:#1a2236;--bd:#1f2d45;--bd2:#263348;--t:#e8edf5;--t2:#8899b4;--t3:#5a6e8a;--nav:62px;--hdr:56px;}
        html{font-size:15px}
        body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;padding-bottom:calc(var(--nav) + env(safe-area-inset-bottom,0px))}
        ::-webkit-scrollbar{display:none}
        header{position:sticky;top:0;z-index:200;height:var(--hdr);background:rgba(7,11,20,.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 1rem;gap:.75rem}
        .logo{width:36px;height:36px;flex-shrink:0;background:linear-gradient(135deg,var(--g),#00b38a);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.1rem;box-shadow:0 0 14px rgba(0,229,176,.35)}
        .brand-txt{flex:1;min-width:0}
        .brand-txt h1{font-size:.95rem;font-weight:900;letter-spacing:-.3px;background:linear-gradient(90deg,#fff 55%,var(--g));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
        .brand-txt p{font-size:.62rem;color:var(--t3)}
        .hdr-r{display:flex;align-items:center;gap:.5rem;flex-shrink:0}
        .sdot{width:8px;height:8px;border-radius:50%;background:var(--y);animation:blink 2s infinite}
        .sdot.ok{background:var(--ok)}.sdot.err{background:var(--r);animation:none}
        @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
        .tlbl{font-size:.65rem;color:var(--t3);font-family:monospace}
        .src-lbl{font-size:.6rem;color:var(--t3);background:var(--card2);padding:.2rem .5rem;border-radius:6px;border:1px solid var(--bd)}
        .ticker{background:var(--bg2);border-bottom:1px solid var(--bd);overflow:hidden;height:32px;display:flex;align-items:center}
        .ticker-track{display:flex;gap:2.5rem;animation:slide 35s linear infinite;width:max-content;padding:0 1.5rem;white-space:nowrap}
        @keyframes slide{from{transform:translateX(0)}to{transform:translateX(-50%)}}
        .tick{display:flex;align-items:center;gap:.4rem;font-size:.72rem;color:var(--t2)}
        .tick.live{color:var(--r);font-weight:700}
        .tdot{width:6px;height:6px;border-radius:50%;background:var(--r);animation:blink 1.2s infinite}
        .page{display:none;padding:.85rem .9rem}.page.on{display:block}
        .pg-title{font-size:.72rem;font-weight:800;text-transform:uppercase;letter-spacing:.6px;color:var(--t3);margin-bottom:.85rem;padding-bottom:.5rem;border-bottom:1px solid var(--bd)}
        .search-wrap{margin-bottom:.85rem;position:relative}
        .search-inp{width:100%;background:var(--card);border:1px solid var(--bd);color:var(--t);padding:.6rem .9rem .6rem 2.2rem;border-radius:10px;font-size:.82rem;outline:none}
        .search-inp:focus{border-color:var(--g)}
        .search-ico{position:absolute;left:.7rem;top:50%;transform:translateY(-50%);font-size:.9rem;pointer-events:none}
        .card{background:var(--card);border:1px solid var(--bd);border-radius:14px;overflow:hidden;margin-bottom:1rem}
        .card.feat{border-color:var(--g)}
        .card-head{background:var(--bg2);padding:.6rem .9rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--bd);position:relative}
        .feat-tag{position:absolute;top:0;right:0;background:var(--g);color:var(--bg);font-size:.58rem;font-weight:900;padding:.18rem .55rem;border-bottom-left-radius:8px}
        .comp-row{display:flex;align-items:center;gap:.5rem;min-width:0;flex:1}
        .comp-flag
